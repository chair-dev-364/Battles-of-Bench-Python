name: Security & Tests

on:
  push:
    branches: [ "main", "copilot/**" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Weekly scan every Monday at 08:00 UTC
    - cron: "0 8 * * 1"

jobs:
  # -------------------------------------------------------------------------
  # 1. Run test suite (all tests except test four)
  # -------------------------------------------------------------------------
  tests:
    name: Pytest (skip test four)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests (excluding test four)
        # pytest.ini already sets addopts=-k "not test_4"
        # The -k flag here makes the skip intent explicit in the CI log.
        run: pytest tests/ -k "not test_4" -v

  # -------------------------------------------------------------------------
  # 2. Bandit — static analysis for Python security issues
  # -------------------------------------------------------------------------
  bandit:
    name: Bandit SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        # Fail the build only on medium-or-higher severity findings.
        # Low-severity issues (e.g. bare except, subprocess without shell) are
        # informational and covered by code review.
        run: |
          bandit -r . \
            --exclude ./.git,./venv,./.venv,./tests \
            --severity-level medium \
            -f txt

  # -------------------------------------------------------------------------
  # 3. pip-audit — dependency vulnerability scanning
  # -------------------------------------------------------------------------
  pip-audit:
    name: pip-audit (dependency CVE scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.txt
